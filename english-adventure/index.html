<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="語言冒險">
<title>語言冒險 Language Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⭐ 語言<span>冒險</span></div>
    <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:600">v1.10</div>
  </div>
  <div class="header-right">
    <!-- 語言切換 -->
    <div class="lang-switcher">
      <button class="lang-flag active" data-lang="en" onclick="switchLang('en')" title="English">🇺🇸</button>
      <button class="lang-flag" data-lang="ja" onclick="switchLang('ja')" title="日本語">🇯🇵</button>
    </div>
    <div class="xp-badge"><span>✨</span><span id="headerXP">0</span> XP</div>
    <div class="level-badge" id="headerLevel">Lv.1</div>
  </div>
</div>

<div class="nav" id="mainNav">
  <!-- 由 JS 動態產生 -->
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div id="reviewBanner" style="display:none"></div>
  <div class="hero-card">
    <div class="hero-greeting">今天也要加油！</div>
    <div class="hero-level" id="heroLevelName">🌱 英語新芽</div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="heroXpBar" style="width:0%"></div></div>
    <div class="xp-label" id="heroXpLabel">0 / 100 XP</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-num" id="statWords">0</div><div class="stat-label">學過的字</div></div>
    <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-num" id="statQuizzes">0</div><div class="stat-label">完成測驗</div></div>
    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-num" id="statCorrect">0</div><div class="stat-label">答對次數</div></div>
  </div>
  <div class="section-title">⚡ 快速開始</div>
  <div class="quick-actions">
    <button class="action-btn quiz" onclick="showScreen('quiz')"><span class="icon">🎯</span>開始測驗</button>
    <button class="action-btn story" onclick="showScreen('story')"><span class="icon">📚</span>AI 故事</button>
    <button class="action-btn add" onclick="showScreen('add')"><span class="icon">✏️</span>新增單字</button>
    <button class="action-btn review" onclick="showScreen('words')"><span class="icon">📖</span>複習單字</button>
  </div>
</div>

<!-- HIRAGANA 50音（日文專屬） -->
<div class="screen" id="screen-hiragana">
  <!-- 由 JS 動態產生 -->
</div>

<!-- WORDS -->
<div class="screen" id="screen-words">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋單字..." oninput="renderWordList()">
  </div>
  <div class="ie-bar">
    <button class="ie-btn export-btn" onclick="exportWords()">⬇️ 匯出 JSON</button>
    <button class="ie-btn import-merge-btn" onclick="triggerImport('merge')">⬆️ 合併匯入</button>
    <button class="ie-btn import-replace-btn" onclick="triggerImport('replace')">🔄 覆蓋匯入</button>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">
  <div id="wordListContainer"></div>
</div>

<!-- ADD -->
<div class="screen" id="screen-add">
  <!-- 英文新增 -->
  <div id="addEnSection">
    <div class="add-card">
      <h3>✏️ 新增英文單字</h3>
      <div class="input-group">
        <label>英文單字</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="addWord" placeholder="例：apple" style="flex:1" onblur="autoLookup()" onkeydown="if(event.key==='Enter'){autoLookup()}">
          <button id="lookupBtn" onclick="autoLookup()" style="background:linear-gradient(135deg,#AB47BC,#7B1FA2);color:white;border:none;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;">🔍 AI 查詢</button>
        </div>
      </div>
      <div id="lookupStatus" style="display:none;margin:-6px 0 10px;font-size:13px;color:#7B1FA2;font-weight:700"></div>
      <div class="input-group"><label>詞性</label><input type="text" id="addPos" placeholder="例：n. 名詞" readonly style="background:#F8F8F8;color:#5C6BC0;font-weight:700"></div>
      <div class="input-group"><label>中文翻譯</label><input type="text" id="addZh" placeholder="例：蘋果"></div>
      <div class="input-group"><label>例句</label><textarea id="addSentence" placeholder="例：I like to eat apples."></textarea></div>
      <button class="submit-btn" onclick="addWord()">➕ 加入單字庫</button>
    </div>
  </div>
  <!-- 日文新增 -->
  <div id="addJaSection" style="display:none">
    <div class="add-card" style="border-top:3px solid #E91E63">
      <h3>🇯🇵 新增日文單字</h3>
      <div class="input-group">
        <label>日文單字</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="addWordJa" placeholder="例：りんご" style="flex:1" onblur="autoLookupJa()" onkeydown="if(event.key==='Enter'){autoLookupJa()}">
          <button id="lookupBtnJa" onclick="autoLookupJa()" style="background:linear-gradient(135deg,#E91E63,#880E4F);color:white;border:none;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;">🔍 AI 查詢</button>
        </div>
      </div>
      <div id="lookupStatusJa" style="display:none;margin:-6px 0 10px;font-size:13px;color:#E91E63;font-weight:700"></div>
      <div class="input-group"><label>平假名讀音</label><input type="text" id="addReadingJa" placeholder="例：りんご" readonly style="background:#F8F8F8;color:#880E4F;font-weight:700"></div>
      <div class="input-group"><label>詞性</label><input type="text" id="addPosJa" placeholder="例：名詞" readonly style="background:#F8F8F8;color:#5C6BC0;font-weight:700"></div>
      <div class="input-group"><label>中文意思</label><input type="text" id="addZhJa" placeholder="例：蘋果"></div>
      <div class="input-group"><label>例句</label><textarea id="addSentenceJa" placeholder="例：りんごが好きです。"></textarea></div>
      <button class="submit-btn" style="background:linear-gradient(135deg,#E91E63,#880E4F)" onclick="addJaWord()">➕ 加入單字庫</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div id="quizMenu">
    <div class="section-title">🎮 選擇測驗方式</div>
    <button class="quiz-option" onclick="startQuiz('spelling')"><span class="quiz-option-icon">🔊</span><div class="quiz-option-text"><div class="quiz-option-title">聽寫單字</div><div class="quiz-option-desc">聽到發音，把單字寫出來</div></div><span class="quiz-option-arrow">›</span></button>
    <button class="quiz-option" onclick="startQuiz('cloze')"><span class="quiz-option-icon">✏️</span><div class="quiz-option-text"><div class="quiz-option-title">克漏字測驗</div><div class="quiz-option-desc">看句子，選出正確的單字（AI出題）</div></div><span class="quiz-option-arrow">›</span></button>
    <button class="quiz-option" onclick="startQuiz('mixed')"><span class="quiz-option-icon">🎰</span><div class="quiz-option-text"><div class="quiz-option-title">綜合測驗</div><div class="quiz-option-desc">混合所有題型，全面練習！</div></div><span class="quiz-option-arrow">›</span></button>
  </div>
  <div id="quizPlay" class="quiz-play">
    <div class="quiz-header">
      <div class="quiz-progress-text" id="quizProgressText">第 1 題 / 共 10 題</div>
      <div class="quiz-score-text" id="quizScoreText">✅ 0 答對</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="quizProgressBar" style="width:0%"></div></div>
    <div class="question-card" id="questionCard"></div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
      <div class="feedback-answer" id="feedbackAnswer"></div>
    </div>
    <button class="check-btn" id="checkBtn" onclick="checkAnswer()">✓ 確認答案</button>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
  </div>
  <div id="quizResult" class="quiz-result">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title">測驗完成！</div>
    <div class="result-score" id="resultScore">8 / 10</div>
    <div class="result-xp" id="resultXP">+40 XP 獲得！</div>
    <button class="result-back-btn" onclick="resetQuiz()">再玩一次 🔄</button>
  </div>
</div>

<!-- STORY -->
<div class="screen" id="screen-story">
  <div id="storySetup">
    <div class="story-header-card">
      <h2>📚 AI 故事</h2>
      <p>選擇難度和主題，AI 幫你生成一篇量身訂做的故事，還可以朗讀！</p>
    </div>
    <div class="story-config-card" id="levelConfigCard">
      <h3>📊 選擇難度</h3>
      <div class="level-grid" id="levelGrid">
        <button class="level-chip selected" data-level="L0.5" onclick="selectLevel('L0.5')"><span class="lv-code">L0.5</span>Graphic<br><span style="font-size:9px;opacity:0.7">Age 8-10</span></button>
        <button class="level-chip" data-level="L1" onclick="selectLevel('L1')"><span class="lv-code">L1</span>Starter<br><span style="font-size:9px;opacity:0.7">A1/N5</span></button>
        <button class="level-chip" data-level="L2" onclick="selectLevel('L2')"><span class="lv-code">L2</span>Elementary<br><span style="font-size:9px;opacity:0.7">A2/N4</span></button>
        <button class="level-chip" data-level="L3" onclick="selectLevel('L3')"><span class="lv-code">L3</span>Intermediate<br><span style="font-size:9px;opacity:0.7">B1/N3</span></button>
        <button class="level-chip" data-level="L4" onclick="selectLevel('L4')"><span class="lv-code">L4</span>Upper-Int<br><span style="font-size:9px;opacity:0.7">B2</span></button>
        <button class="level-chip" data-level="L5" onclick="selectLevel('L5')"><span class="lv-code">L5</span>Advanced<br><span style="font-size:9px;opacity:0.7">C1</span></button>
      </div>
    </div>
    <div class="story-config-card">
      <h3>🎭 選擇主題</h3>
      <div class="genre-grid" id="genreGrid"></div>
    </div>
    <button class="story-gen-btn" id="storyGenBtn" onclick="generateStory()">📖 生成故事！</button>
  </div>

  <div id="storyResult" class="story-result-wrap">
    <div class="story-layout">
      <div class="story-left">
        <div id="storyImageArea">
          <button class="story-img-btn" onclick="generateStoryImage()">🎨 生成故事插圖</button>
        </div>
      </div>
      <div class="story-right">
        <div class="story-result-card">
          <div class="story-title" id="storyTitle"></div>
          <div class="story-meta" id="storyMeta"></div>
          <div class="story-read-controls">
            <button class="story-ctrl-btn btn-read-all" onclick="readStoryAll()">🔊 整篇朗讀</button>
            <button class="story-ctrl-btn btn-read-step" onclick="readStoryStep()">▶️ 逐句朗讀</button>
            <button class="story-ctrl-btn btn-stop" onclick="stopReading()">⏹ 停止</button>
          </div>
          <div class="story-body" id="storyBody"></div>
          <div id="storyZhArea"></div>
          <div id="culturalNote" style="display:none" class="cultural-note"></div>
        </div>
      </div>
    </div>
    <div class="vocab-section">
      <h3>📝 Key Vocabulary</h3>
      <div id="vocabList"></div>
      <button class="vocab-import-btn" onclick="importVocab()">✅ 加入選取單字到單字庫</button>
    </div>
    <button class="story-back-btn" onclick="showStorySetup()">← 重新設定</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="screen-settings">
  <!-- 由 JS 動態產生 -->
</div>

<!-- WRONG -->
<div class="screen" id="screen-wrong">
  <div class="section-title">❌ 錯題本</div>
  <div id="wrongContainer"></div>
</div>

<div class="toast" id="toast"></div>
<canvas class="confetti-overlay" id="confettiCanvas"></canvas>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
// 根據語言顯示/隱藏新增單字區塊
function updateAddSection() {
  const isJa = state.lang === 'ja';
  document.getElementById('addEnSection').style.display = isJa ? 'none' : 'block';
  document.getElementById('addJaSection').style.display = isJa ? 'block' : 'none';
  // 日文模式隱藏 L4/L5
  const levelGrid = document.getElementById('levelGrid');
  if (levelGrid) {
    levelGrid.querySelectorAll('[data-level="L4"],[data-level="L5"]').forEach(btn => {
      btn.style.display = isJa ? 'none' : '';
    });
  }
}
// 每次切換語言後呼叫
const _origSwitchLang = switchLang;
window.switchLang = function(lang) {
  _origSwitchLang(lang);
  updateAddSection();
  renderGenreGrid(storyState.level);
};
// 初始化
updateAddSection();
renderGenreGrid(storyState.level);
</script>
</body>
</html>
